<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصفح الحرفيين | HRFA.MA</title>
    <meta name="description" content="ابحث عن أفضل الحرفيين في مدينتك. تصفح قائمة حرفيين موثقين واحجز موعداً بسهولة.">
    <link rel="icon" type="image/jpeg" href="logo.png.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="api.js" defer></script>
    <script src="navbar.js" defer></script>

    <style>
        .page-banner {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: white;
            padding: 80px 0 100px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--primary-orange);
        }

        .page-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.05;
            pointer-events: none;
        }

        .page-banner h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .page-banner p {
            opacity: 0.7;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        .filter-container {
            margin-top: -60px;
            position: relative;
            z-index: 100;
            padding: 0 20px;
        }

        .filter-bar {
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }


        .filter-group i {
            color: var(--primary-orange);
            font-size: 20px;
        }

        .filter-group select,
        .filter-group input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-dark);
            cursor: pointer;
        }

        .filter-bar .container {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select,
        .filter-bar input[type="text"] {
            padding: 11px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            background: var(--bg-light);
            outline: none;
            transition: var(--transition);
            cursor: pointer;
            min-width: 160px;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px var(--primary-orange-mid);
        }

        .filter-bar input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .results-count {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .artisans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 26px;
        }

        .artisan-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--border-color);
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .artisan-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-orange), #FF6B35);
            transform: scaleX(0);
            transition: var(--transition);
        }

        .artisan-card:hover::after {
            transform: scaleX(1);
        }

        .artisan-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-orange);
            box-shadow: 0 20px 40px rgba(255, 69, 0, 0.1);
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-orange);
            box-shadow: 0 20px 40px rgba(255, 69, 0, 0.1);
        }

        .artisan-top {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .artisan-avatar {
            width: 78px;
            height: 78px;
            border-radius: 18px;
            object-fit: cover;
            border: 3px solid var(--bg-light);
            flex-shrink: 0;
        }

        .artisan-name {
            font-size: 19px;
            font-weight: 900;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .artisan-name i {
            color: #3B82F6;
            font-size: 16px;
        }

        .rating {
            color: #F59E0B;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rating span {
            color: var(--text-muted);
            font-weight: 600;
        }

        .artisan-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: var(--bg-light);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .tag i {
            color: var(--primary-orange);
        }

        .artisan-bio {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .artisan-footer {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .artisan-footer .price {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 14px;
        }

        .artisan-footer .price strong {
            color: var(--primary-orange);
            font-size: 16px;
        }

        .availability-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
        }

        .dot-green {
            background: #10B981;
        }

        .dot-red {
            background: #EF4444;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @keyframes shimmer {
            to {
                background-position: -200% 0;
            }
        }

        .skeleton-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1.5px solid var(--border-color);
        }

        /* BOOKING MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: white;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            transform: translateY(30px) scale(0.96);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.open .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--bg-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--primary-orange);
            color: white;
        }

        .modal-artisan {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 28px;
            padding: 18px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
        }

        .modal-artisan img {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            object-fit: cover;
        }

        .success-state {
            text-align: center;
            padding: 20px 0;
            display: none;
        }

        .success-icon {
            font-size: 64px;
            color: #10B981;
            margin-bottom: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state i {
            font-size: 60px;
            color: #E2E8F0;
            margin-bottom: 20px;
            display: block;
        }

        @media (max-width: 768px) {
            .artisans-grid {
                grid-template-columns: 1fr;
            }

            .page-banner h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar"></nav>

    <!-- Page Header -->
    <header class="page-banner">
        <div class="container" style="position: relative; z-index: 2;">
            <h1>ابحث عن المحترف المناسب</h1>
            <p>تصفح قائمة الحرفيين الموثوقين واقرأ تقييمات الزبائن وتواصل معهم مباشرة.</p>
        </div>
    </header>

    <!-- Unified Premium Filter Bar -->
    <div class="filter-container">
        <div class="filter-bar">
            <div class="filter-group">
                <div class="border-beam-container"></div>
                <input type="text" id="keywordSearch" placeholder="ابحث باسم الحرفي أو الكلمة الدلالية..."
                    onkeyup="applyFilters()">
                <i class="ri-search-2-line"></i>
            </div>

            <div class="filter-group">
                <div class="border-beam-container"></div>
                <select id="categoryFilter" onchange="applyFilters()">
                    <option value="">جميع التخصصات</option>
                    <option value="electricity">الكهرباء</option>
                    <option value="plumbing">السباكة</option>
                    <option value="painting">الدهان</option>
                    <option value="carpentry">النجارة</option>
                    <option value="masonry">البناء</option>
                    <option value="cleaning">التنظيف</option>
                    <option value="aluminium">الألمنيوم</option>
                    <option value="appliances">إلكترومنزلية</option>
                    <option value="transport">النقل</option>
                    <option value="air-conditioning">التكييف</option>
                </select>
                <i class="ri-tools-line"></i>
            </div>

            <div class="filter-group">
                <div class="border-beam-container"></div>
                <select id="cityFilter" onchange="applyFilters()">
                    <option value="">جميع المدن</option>
                    <option value="casablanca">الدار البيضاء</option>
                    <option value="rabat">الرباط</option>
                    <option value="marrakech">مراكش</option>
                    <option value="tanger">طنجة</option>
                    <option value="fes">فاس</option>
                    <option value="agadir">أكادير</option>
                    <option value="taroudant">تارودانت</option>
                    <option value="kenitra">القنيطرة</option>
                    <option value="oujda">وجدة</option>
                </select>
                <i class="ri-map-pin-2-line"></i>
            </div>

            <button class="btn btn-primary" onclick="applyFilters()"
                style="padding: 16px 35px; border-radius: 16px; font-weight: 800; font-size: 16px; margin-right: auto; box-shadow: 0 15px 30px rgba(255, 69, 0, 0.25);">
                <i class="ri-refresh-line"></i> تحديث البحث
            </button>
        </div>
    </div>

    <!-- Results -->
    <section class="section" style="padding-top: 50px;">
        <div class="container">
            <div class="results-header">
                <div class="results-count" id="resultsCount">جارٍ البحث عن أفضل المحترفين...</div>
            </div>
            <div class="artisans-grid" id="artisansGrid">
                <!-- Skeletons go here -->
            </div>
        </div>
    </section>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box" style="position:relative;">
            <button class="modal-close" onclick="closeModal()" title="إغلاق"><i class="ri-close-line"></i></button>
            <div class="modal-artisan" id="modalArtisanInfo"></div>
            <div id="formState">
                <h2 style="font-size:22px; font-weight:900; margin-bottom:6px;">حجز موعد</h2>
                <form id="bookingForm">
                    <input type="hidden" id="bArtisanId">
                    <input type="hidden" id="bArtisanName">
                    <div class="form-group">
                        <label><i class="ri-service-line"></i> نوع الخدمة</label>
                        <input type="text" id="bService" placeholder="مثال: إصلاح تسرب مياه" required>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <input type="date" id="bDate" required>
                        <input type="time" id="bTime" value="09:00" required>
                    </div>
                    <div class="form-group mt-20">
                        <label><i class="ri-map-pin-line"></i> العنوان</label>
                        <input type="text" id="bAddress" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full mt-20" id="submitBookingBtn"
                        style="padding:18px; font-size:18px; box-shadow: 0 10px 20px rgba(255,69,0,0.3);">تأكيد الحجز
                        الآن <i class="ri-arrow-left-line"></i></button>
                </form>
            </div>
            <div class="success-state" id="successState">
                <i class="ri-checkbox-circle-fill success-icon"></i>
                <h3>تم إرسال طلبك بنجاح!</h3>
                <button class="btn btn-primary mt-20" onclick="closeModal()">حسناً</button>
            </div>
        </div>
    </div>

    <footer style="background: #0F172A; color: white; padding: 60px 0 40px;">
        <div class="container" style="text-align: center;">
            <a href="index.html" class="logo" style="color: white; margin-bottom: 20px; justify-content: center;">HRFA<span
                    class="text-orange">.MA</span></a>
            <div
                style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 14px; opacity: 0.7;">
                <a href="terms.html" style="color: white;">الشروط والأحكام</a>
                <a href="privacy.html" style="color: white;">سياسة الخصوصية</a>
                <a href="contact.html" style="color: white;">تواصل معنا</a>
            </div>
            <p style="opacity: 0.5; font-size: 13px;">&copy; 2024 HRFA.MA - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script>
        const API = 'http://localhost:3000/api';
        let currentArtisans = [];

        async function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const city = document.getElementById('cityFilter').value;
            const q = document.getElementById('keywordSearch').value;

            const grid = document.getElementById('artisansGrid');
            const count = document.getElementById('resultsCount');

            // Show skeletons while loading
            grid.innerHTML = getSkeletons(6);
            count.textContent = 'جارٍ البحث...';

            try {
                const params = {};
                if (category) params.category = category;
                if (city) params.city = city;
                if (q) params.q = q;

                const data = await api.getArtisans(params);
                currentArtisans = data.data || [];
                renderArtisans(currentArtisans);
            } catch (err) {
                renderStaticFallback(category, city, q);
            }
        }

        async function loadArtisans() { applyFilters(); }

        function renderArtisans(list) {
            const grid = document.getElementById('artisansGrid');
            const count = document.getElementById('resultsCount');
            if (!list.length) {
                count.textContent = 'لا توجد نتائج.';
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1; text-align:center; padding:100px 0;"><i class="ri-search-eye-line" style="font-size:60px; color:#ccc;"></i><h3 class="mt-20">لم نجد أي حرفي يطابق بحثك حالياً</h3></div>';
                return;
            }
            count.textContent = `وجدنا ${list.length} محترف خبير جاهز لخدمتك`;
            grid.innerHTML = list.map(a => `
                <div class="artisan-card">
                    <div class="artisan-top">
                        <img src="${a.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(a.name) + '&background=random'}" class="artisan-avatar" alt="${a.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=random&size=200'">
                        <div style="flex:1;">
                            <div class="artisan-name">${a.name} ${a.verified ? '<span class="verified-badge" style="background:rgba(59,130,246,0.1); color:#3B82F6; padding:2px 8px; border-radius:100px; font-size:11px;"><i class="ri-shield-check-fill"></i> موثق</span>' : ''}</div>
                            <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                                <div class="rating-stars">${Array(5).fill(0).map((_, i) => `<i class="ri-star-${i < Math.floor(a.rating) ? 'fill' : 'line'}" style="color:#F59E0B; font-size:14px;"></i>`).join('')}</div>
                                <span style="font-size:13px; font-weight:700;">${a.rating} (${a.reviews})</span>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <span class="tag"><i class="ri-tools-fill"></i> ${a.categoryLabel || 'حرفة'}</span>
                        <span class="tag"><i class="ri-map-pin-2-fill"></i> ${a.cityLabel || 'المدينة'}</span>
                    </div>
                    <p class="artisan-bio mt-20" style="height:45px; overflow:hidden; font-size:14px; color:var(--text-muted);">${a.bio}</p>
                    <div style="border-top:1px solid var(--border-color); padding-top:20px; margin-top:auto; display:flex; justify-content:space-between; align-items:center;">
                         <div>
                            <span style="display:block; font-size:11px; color:var(--text-muted);">التوفر</span>
                            <span style="font-weight:900; color:#10B981; font-size:14px;"><i class="ri-checkbox-circle-fill"></i> متاح الآن</span>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button onclick="checkAuthAndProfile(${a.id})" class="btn btn-outline" style="padding:10px 15px; font-size:13px;">الملف</button>
                            <button onclick="checkAuthAndBooking(${JSON.stringify(a).replace(/"/g, '&quot;')})" class="btn btn-primary" style="padding:10px 15px; font-size:13px; box-shadow: 0 4px 12px rgba(255,69,0,0.2);">حجز</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Authentication redirect helper
        function checkAuthAndProfile(artisanId) {
            const user = JSON.parse(localStorage.getItem('hrfa_user') || 'null');
            const token = localStorage.getItem('hrfa_token');
            if (!user || !token) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent('artisan-profile.html?id=' + artisanId);
                return;
            }
            window.location.href = `artisan-profile.html?id=${artisanId}`;
        }

        function checkAuthAndBooking(artisan) {
            const user = JSON.parse(localStorage.getItem('hrfa_user') || 'null');
            const token = localStorage.getItem('hrfa_token');
            if (!user || !token) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent('artisans.html?booking=' + artisan.id);
                return;
            }
            openBooking(artisan);
        }

        function getSkeletons(n) {
            return Array(n).fill('').map(() => `<div class="skeleton-card" style="height:320px;"><div class="skeleton" style="height:80px; width:80px; border-radius:15px; margin-bottom:20px;"></div><div class="skeleton" style="height:20px; width:150px; margin-bottom:10px;"></div><div class="skeleton" style="height:14px; width:200px;"></div></div>`).join('');
        }

        const fallbackData = [
            { id: 1, name: 'أحمد العبدلاوي', city: 'casablanca', cityLabel: 'الدار البيضاء', category: 'electricity', categoryLabel: 'الكهرباء', rating: 4.9, reviews: 128, verified: true, bio: 'مختص في كشف أعطال الكهرباء المنزلية وتركيب الثريات واللوحات الكهربائية الحديثة.', avatar: 'https://ui-avatars.com/api/?name=Ahmed+A&background=FF4500&color=fff&size=200' },
            { id: 2, name: 'سعيد محمدي', city: 'rabat', cityLabel: 'الرباط', category: 'plumbing', categoryLabel: 'السباكة', rating: 4.8, reviews: 85, verified: true, bio: 'حلول شاملة لتسربات المياه، إصلاح الصنابير وشبكات المياه، وتركيب سخانات المياه.' },
            { id: 3, name: 'ياسين الصباغ', city: 'marrakech', cityLabel: 'مراكش', category: 'painting', categoryLabel: 'الصباغة', rating: 4.7, reviews: 64, verified: false, bio: 'صباغة عصرية وديكورات خيال، خبرة طويلة وتفانٍ في العمل.' }
        ];

        function renderStaticFallback(cat, city, q) {
            let list = fallbackData;
            if (cat) list = list.filter(a => a.category === cat);
            if (city) list = list.filter(a => a.city === city);
            if (q) list = list.filter(a => a.name.includes(q));
            renderArtisans(list);
        }

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('city')) document.getElementById('cityFilter').value = params.get('city');
            if (params.get('category')) document.getElementById('categoryFilter').value = params.get('category');
            if (params.get('q')) document.getElementById('keywordSearch').value = params.get('q');

            await applyFilters();

            // Auto-open booking if coming from profile
            const bookingId = params.get('booking');
            if (bookingId && currentArtisans.length > 0) {
                const artisan = currentArtisans.find(a => a.id == bookingId) || fallbackData.find(a => a.id == bookingId);
                if (artisan) openBooking(artisan);
            }
        };

        function openBooking(artisan) {
            document.getElementById('bArtisanId').value = artisan.id;
            document.getElementById('bArtisanName').value = artisan.name;
            document.getElementById('modalArtisanInfo').innerHTML = `
                <img src="${artisan.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(artisan.name)}" alt="${artisan.name}">
                <div>
                    <h4 style="font-weight:800;">${artisan.name}</h4>
                    <p class="text-muted" style="font-size:12px;">${artisan.categoryLabel} | ${artisan.cityLabel}</p>
                </div>
            `;
            document.getElementById('formState').style.display = 'block';
            document.getElementById('successState').style.display = 'none';
            document.getElementById('bookingModal').classList.add('open');
        }

        function closeModal() { document.getElementById('bookingModal').classList.remove('open'); }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('hrfa_user') || 'null');
            if (!user) {
                alert('يرجى تسجيل الدخول أولاً لإتمام الحجز.');
                window.location.href = 'login.html';
                return;
            }

            const btn = document.getElementById('submitBookingBtn');
            btn.classList.add('btn-loading');

            const bookingData = {
                artisanId: document.getElementById('bArtisanId').value,
                artisanName: document.getElementById('bArtisanName').value,
                clientId: user.id,
                clientName: user.name,
                serviceType: document.getElementById('bService').value,
                date: document.getElementById('bDate').value,
                time: document.getElementById('bTime').value,
                address: document.getElementById('bAddress').value
            };

            try {
                const response = await fetch(`${API}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                const result = await response.json();
                if (result.success) {
                    showSuccess();
                } else {
                    alert('خطأ في إرسال الحجز: ' + (result.message || 'حاول مرة أخرى.'));
                }
            } catch (err) {
                console.error('Booking error:', err);
                alert('حدث خطأ أثناء إرسال طلبك. يرجى المحاولة لاحقاً.');
            } finally {
                btn.classList.remove('btn-loading');
            }
        });

        function showSuccess() {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }
    </script>
</body>

</html>
