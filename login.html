<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | HRFA.MA</title>
    <link rel="icon" type="image/jpeg" href="logo.png.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="api.js" defer></script>
    <script src="navbar.js" defer></script>
    <style>
        .alert-error {
            background: #FEF2F2;
            color: #DC2626;
            padding: 13px 16px;
            border-radius: var(--radius-md);
            border: 1px solid #FECACA;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .eye-toggle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            background: none;
            border: none;
        }

        .pass-wrapper {
            position: relative;
        }

        .pass-wrapper input {
            padding-left: 44px;
        }
    </style>
</head>

<body>
    <nav class="navbar"></nav>
    <div class="auth-container">
        <div class="card auth-card">
            <div style="text-align: center; margin-bottom: 36px;">
                <h1 style="font-size: 28px; font-weight: 900;">مرحباً بعودتك</h1>
                <p class="text-muted">سجّل دخولك لمتابعة أعمالك وطلباتك</p>
            </div>


            <div class="alert-error" id="loginError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="ri-mail-line"></i> البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <label style="margin-bottom: 0;"><i class="ri-lock-line"></i> كلمة المرور</label>
                        <a href="#" class="text-orange" style="font-size: 13px; font-weight: 700;">نسيت كلمة المرور؟</a>
                    </div>
                    <div class="pass-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="eye-toggle" onclick="togglePass('loginPassword', this)">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
                    <input type="checkbox" id="remember" style="width:18px; height:18px; cursor:pointer;">
                    <label for="remember"
                        style="margin-bottom:0; font-size:14px; color:var(--text-muted); cursor:pointer;">تذكرني على هذا
                        الجهاز</label>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding:16px; font-size:16px;"
                    id="loginBtn">
                    تسجيل الدخول <i class="ri-login-circle-line"></i>
                </button>
            </form>

            <div
                style="text-align: center; margin-top: 28px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <p class="text-muted">ليس لديك حساب؟ <a href="register.html" class="text-orange"
                        style="font-weight:800;">إنشاء حساب جديد</a></p>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 15px; opacity: 0.8;">
                    تسجيلك للدخول يعني موافقتك على <a href="terms.html" class="text-orange">الشروط والأحكام</a> و <a
                        href="privacy.html" class="text-orange">سياسة الخصوصية</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';


        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.querySelector('i').className = 'ri-eye-off-line';
            } else {
                inp.type = 'password';
                btn.querySelector('i').className = 'ri-eye-line';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.classList.add('btn-loading');

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const data = await api.login(email, password);

                if (data.success) {
                    localStorage.setItem('hrfa_token', data.token);
                    localStorage.setItem('hrfa_user', JSON.stringify(data.user));
                    
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || (data.user.role === 'artisan' ? 'artisan-dashboard.html' : 'client-dashboard.html');
                    window.location.href = redirect;
                } else {
                    errEl.textContent = data.message || 'بيانات الدخول غير صحيحة.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                // Fallback demo mode when backend offline
                const params = new URLSearchParams(window.location.search);
                if (email === 'client@hrfa.ma' && password === '123456') {
                    const user = { id: 2, name: 'جلال الزبون', email, role: 'client', avatar: 'https://ui-avatars.com/api/?name=Jalal+Z&background=3B82F6&color=fff&size=200' };
                    localStorage.setItem('hrfa_user', JSON.stringify(user));
                    localStorage.setItem('hrfa_token', 'demo-token');
                    const redirect = params.get('redirect') || 'client-dashboard.html';
                    setTimeout(() => window.location.href = redirect, 500);
                } else if (email === 'artisan@hrfa.ma' && password === '123456') {
                    const user = { id: 1, name: 'أحمد الحرفي', email, role: 'artisan', avatar: 'https://ui-avatars.com/api/?name=Ahmed+H&background=FF4500&color=fff&size=200' };
                    localStorage.setItem('hrfa_user', JSON.stringify(user));
                    localStorage.setItem('hrfa_token', 'demo-token');
                    const redirect = params.get('redirect') || 'artisan-dashboard.html';
                    setTimeout(() => window.location.href = redirect, 500);
                } else {
                    errEl.textContent = err.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
                    errEl.style.display = 'block';
                }
            }

            btn.classList.remove('btn-loading');
        });
    </script>
</body>

</html>
