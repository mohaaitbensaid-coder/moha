<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | HRFA.MA</title>
    <link rel="icon" type="image/jpeg" href="logo.png.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="api.js" defer></script>
    <script src="navbar.js" defer></script>
    <style>
        .role-selector {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }

        .role-option {
            flex: 1;
            text-align: center;
            padding: 20px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            background: white;
        }

        .role-option i {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .role-option span {
            font-weight: 800;
            font-size: 15px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .role-option:hover {
            border-color: var(--primary-orange);
        }

        .role-option.active {
            border-color: var(--primary-orange);
            background: var(--primary-orange-light);
        }

        .role-option.active i,
        .role-option.active span {
            color: var(--primary-orange);
        }

        #artisanFields {
            display: none;
        }

        .alert-error {
            background: #FEF2F2;
            color: #DC2626;
            padding: 13px 16px;
            border-radius: var(--radius-md);
            border: 1px solid #FECACA;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .pass-wrapper {
            position: relative;
        }

        .pass-wrapper input {
            padding-left: 44px;
        }

        .eye-toggle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            background: none;
            border: none;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
            background: var(--border-color);
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0%;
        }
    </style>
</head>

<body>
    <nav class="navbar"></nav>
    <div class="auth-container">
        <div class="card auth-card">
            <div style="text-align: center; margin-bottom: 28px;">
                <h1 style="font-size: 26px; font-weight: 900;">إنشاء حساب جديد</h1>
                <p class="text-muted">انضم إلى آلاف المستخدمين في دقيقة واحدة</p>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <div class="role-option active" id="roleClient" onclick="selectRole('client')">
                    <i class="ri-user-heart-fill"></i>
                    <span>زبون</span>
                    <p style="font-size:12px; color:var(--text-muted); margin-top:6px; font-weight:600;">أبحث عن حرفي
                    </p>
                </div>
                <div class="role-option" id="roleArtisan" onclick="selectRole('artisan')">
                    <i class="ri-tools-fill"></i>
                    <span>حرفي</span>
                    <p style="font-size:12px; color:var(--text-muted); margin-top:6px; font-weight:600;">أقدم خدماتي</p>
                </div>
            </div>

            <div class="alert-error" id="registerError"></div>

            <form id="registerForm">
                <input type="hidden" id="selectedRole" value="client">

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>الاسم الكامل</label>
                        <input type="text" id="regName" placeholder="أحمد العبدلاوي" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="regPhone" placeholder="06XXXXXXXX" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top:20px;">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>

                <!-- Artisan-only fields -->
                <div id="artisanFields">
                    <div class="form-group">
                        <label>التخصص المهني</label>
                        <select id="regSpecialty">
                            <option value="">اختر تخصصك</option>
                            <option value="plumbing">السباكة</option>
                            <option value="electricity">الكهرباء</option>
                            <option value="carpentry">النجارة</option>
                            <option value="painting">الصباغة</option>
                            <option value="masonry">البناء</option>
                            <option value="cleaning">التنظيف</option>
                            <option value="aluminium">الألمنيوم</option>
                            <option value="appliances">إلكترومنزلية</option>
                            <option value="transport">النقل</option>
                            <option value="air-conditioning">التكييف</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المدينة</label>
                        <select id="regCity">
                            <option value="">اختر مدينتك</option>
                            <option value="casablanca">الدار البيضاء</option>
                            <option value="rabat">الرباط</option>
                            <option value="marrakech">مراكش</option>
                            <option value="tangier">طنجة</option>
                            <option value="fes">فاس</option>
                            <option value="agadir">أكادير</option>
                            <option value="taroudant">تارودانت</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="pass-wrapper">
                        <input type="password" id="regPassword" placeholder="••••••••" required
                            oninput="checkStrength(this.value)">
                        <button type="button" class="eye-toggle" onclick="togglePass('regPassword', this)">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <p id="strengthText"
                        style="font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:600;"></p>
                </div>

                <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:24px;">
                    <input type="checkbox" id="terms"
                        style="width:18px; height:18px; cursor:pointer; flex-shrink:0; margin-top:2px;" required>
                    <label for="terms"
                        style="margin-bottom:0; font-size:13px; color:var(--text-muted); cursor:pointer; line-height:1.5;">
                        أوافق على <a href="terms.html" class="text-orange" style="font-weight:800;">الشروط والأحكام</a>
                        و <a href="privacy.html" class="text-orange" style="font-weight:800;">سياسة الخصوصية</a> الخاصة
                        بـ HRFA.MA
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding:16px; font-size:16px;"
                    id="registerBtn">
                    إنشاء الحساب <i class="ri-user-add-line"></i>
                </button>
            </form>

            <div
                style="text-align: center; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <p class="text-muted">لديك حساب؟ <a href="login.html" class="text-orange" style="font-weight:800;">تسجيل
                        الدخول</a></p>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        function selectRole(role) {
            document.getElementById('selectedRole').value = role;
            document.getElementById('roleClient').classList.toggle('active', role === 'client');
            document.getElementById('roleArtisan').classList.toggle('active', role === 'artisan');
            document.getElementById('artisanFields').style.display = role === 'artisan' ? 'block' : 'none';
        }

        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.querySelector('i').className = 'ri-eye-off-line';
            } else {
                inp.type = 'password';
                btn.querySelector('i').className = 'ri-eye-line';
            }
        }

        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val) || /[أ-ي]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = ['', 'ضعيفة جداً', 'ضعيفة', 'متوسطة', 'قوية', 'قوية جداً'];
            const colors = ['', '#EF4444', '#F97316', '#F59E0B', '#10B981', '#059669'];
            const widths = ['0%', '20%', '40%', '60%', '85%', '100%'];

            fill.style.width = widths[score] || '0%';
            fill.style.background = colors[score] || '#E2E8F0';
            text.textContent = val ? `قوة كلمة المرور: ${levels[score]}` : '';
            text.style.color = colors[score] || 'var(--text-muted)';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errEl = document.getElementById('registerError');
            errEl.style.display = 'none';
            btn.classList.add('btn-loading');

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('selectedRole').value;
            const specialty = document.getElementById('regSpecialty')?.value || null;
            const city = document.getElementById('regCity')?.value || null;

            if (password.length < 6) {
                errEl.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.';
                errEl.style.display = 'block';
                btn.classList.remove('btn-loading');
                return;
            }

            try {
                const registrationData = { name, email, phone, password, role, specialty, city };
                const data = await api.register(registrationData);

                if (data.success) {
                    localStorage.setItem('hrfa_token', data.token);
                    localStorage.setItem('hrfa_user', JSON.stringify(data.user));
                    window.location.href = data.user.role === 'artisan' ? 'artisan-dashboard.html' : 'client-dashboard.html';
                } else {
                    errEl.textContent = data.message || 'حدث خطأ. حاول مرة أخرى.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                // Fallback demo mode
                const user = { id: Date.now(), name, email, role, avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=200` };
                localStorage.setItem('hrfa_user', JSON.stringify(user));
                localStorage.setItem('hrfa_token', 'demo-token');
                setTimeout(() => {
                    window.location.href = role === 'artisan' ? 'artisan-dashboard.html' : 'client-dashboard.html';
                }, 500);
            }

            btn.classList.remove('btn-loading');
        });
    </script>
</body>

</html>
