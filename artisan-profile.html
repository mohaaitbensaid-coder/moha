<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | HRFA.MA</title>
    <link rel="icon" type="image/jpeg" href="logo.png.jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="navbar.js" defer></script>
    <script src="api.js"></script>
    <style>
        .profile-header {
            background: linear-gradient(135deg, var(--text-black), #333);
            color: white;
            padding: 80px 0 40px;
            position: relative;
        }

        .profile-container {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            position: relative;
            top: 60px;
        }

        .profile-avatar-wrapper {
            background: var(--bg-white);
            padding: 8px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .profile-avatar {
            width: 180px;
            height: 180px;
            border-radius: var(--radius-md);
            object-fit: cover;
            display: block;
        }

        .profile-info {
            flex: 1;
            padding-bottom: 20px;
        }

        .profile-name {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .is-verified {
            color: #10B981;
            font-size: 24px;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            opacity: 0.9;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .stat-item i {
            color: var(--primary-orange);
            font-size: 20px;
        }

        .profile-content {
            margin-top: 100px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .about-section {
            margin-bottom: 40px;
        }

        .about-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .about-section h2 i {
            color: var(--primary-orange);
        }

        .about-text {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.8;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .portfolio-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .portfolio-img:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
            cursor: pointer;
        }

        .action-card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .action-card h3 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        .price-badge {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-orange);
            margin-bottom: 25px;
            display: block;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Responsive for Profile */
        @media (max-width: 768px) {
            .profile-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
                top: 40px;
                gap: 20px;
            }

            .profile-avatar {
                width: 130px;
                height: 130px;
                border-radius: 20px;
            }

            .profile-name {
                font-size: 28px;
                justify-content: center;
                gap: 8px;
            }

            .profile-stats {
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }

            .profile-content {
                margin-top: 80px;
                grid-template-columns: 1fr;
                padding: 0 15px !important;
            }

            .sticky-contact-box {
                position: static;
                margin-top: 20px;
                padding: 25px;
            }

            .profile-header {
                padding: 60px 0 30px;
            }

            .gallery-item img {
                height: 200px;
            }
        }

        /* BOOKING MODAL STYLES */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: white;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            transform: translateY(30px) scale(0.96);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .modal-overlay.open .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--primary-orange);
            color: white;
        }

        .modal-artisan {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 28px;
            padding: 18px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
            text-align: right;
        }

        .modal-artisan img {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            object-fit: cover;
        }

        .success-state {
            text-align: center;
            padding: 20px 0;
            display: none;
        }

        .success-icon {
            font-size: 64px;
            color: #10B981;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-dark);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            outline: none;
            font-weight: 600;
        }

        .form-group input:focus {
            border-color: var(--primary-orange);
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-container">
            <div class="loader"></div>
            <p>جارٍ تحميل بيانات الحرفي...</p>
        </div>
    </div>

    <nav class="navbar"></nav>

    <header class="profile-header">
        <div class="container">
            <div class="profile-container">
                <div class="profile-avatar-wrapper">
                    <img id="artisanAvatar" src="" class="profile-avatar" alt="Avatar">
                </div>
                <div class="profile-info">
                    <h1 class="profile-name">
                        <span id="artisanName">...</span>
                        <i id="verifiedBadge" class="ri-shield-check-fill is-verified" title="حساب موثق"
                            style="display: none;"></i>
                    </h1>
                    <div class="profile-stats">
                        <div class="stat-item"><i class="ri-map-pin-2-fill"></i> <span id="artisanLocation">...</span>
                        </div>
                        <div class="stat-item"><i class="ri-flashlight-fill"></i> <span id="artisanCategory">...</span>
                        </div>
                        <div class="stat-item"><i class="ri-star-fill" style="color: #F59E0B;"></i> <span
                                id="artisanRating">...</span></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container profile-content">
        <!-- Main Details -->
        <div>
            <div class="card about-section">
                <h2><i class="ri-user-smile-line"></i> نبذة عني</h2>
                <p id="artisanBio" class="about-text">...</p>
            </div>

            <div class="card about-section">
                <h2><i class="ri-image-2-line"></i> معرض الأعمال (Portfolio)</h2>
                <div class="portfolio-gallery" id="portfolioGallery">
                    <!-- Gallery items will be injected here -->
                    <div class="gallery-item"><img
                            src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?auto=format&fit=crop&q=80">
                    </div>
                    <div class="gallery-item"><img
                            src="https://images.unsplash.com/photo-1540104539506-692589e47209?auto=format&fit=crop&q=80">
                    </div>
                    <div class="gallery-item"><img
                            src="https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80">
                    </div>
                    <div class="gallery-item"><img
                            src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80">
                    </div>
                </div>
            </div>

            <div class="card about-section">
                <h2><i class="ri-message-2-line"></i> تقييمات الزبناء (<span id="reviewCount">0</span>)</h2>
                <div id="reviewsContainer">
                    <!-- Reviews will be injected here -->
                </div>
            </div>
        </div>

        <!-- Sidebar Actions -->
        <div>
            <div class="sticky-contact-box">
                <h3 style="font-weight:900;">هل تحتاج إلى خدمتي؟</h3>
                <p class="text-muted mb-20">تواصل معي الآن لشرح طلبك وتحديد موعد مناسب.</p>


                <button class="btn btn-primary w-full" style="padding:16px; font-size:18px;"
                    onclick="handleBookingAction()">
                    <i class="ri-calendar-check-line"></i> حجز موعد الآن
                </button>

                <button class="btn btn-outline w-full mt-20" style="padding:16px; font-size:18px;"
                    onclick="handleChatAction()">
                    <i class="ri-message-3-line"></i> محادثة فورية
                </button>

                <div
                    style="margin-top:20px; font-size:13px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:8px; font-weight:700;">
                    <i class="ri-time-line" style="color:var(--primary-orange);"></i> أرد عادةً خلال أقل من ساعة
                </div>
            </div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()" title="إغلاق"><i class="ri-close-line"></i></button>
            <div class="modal-artisan" id="modalArtisanInfo"></div>
            <div id="formState">
                <h2 style="font-size:22px; font-weight:900; margin-bottom:6px; text-align:right;">حجز موعد</h2>
                <form id="bookingForm">
                    <input type="hidden" id="bArtisanId">
                    <input type="hidden" id="bArtisanName">
                    <div class="form-group">
                        <label><i class="ri-service-line"></i> نوع الخدمة</label>
                        <input type="text" id="bService" placeholder="مثال: إصلاح تسرب مياه" required>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label>الوقت</label>
                            <input type="time" id="bTime" value="09:00" required>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label>التاريخ</label>
                            <input type="date" id="bDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="ri-map-pin-line"></i> العنوان</label>
                        <input type="text" id="bAddress" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full mt-20" id="submitBookingBtn"
                        style="padding:18px; font-size:18px; box-shadow: 0 10px 20px rgba(255,69,0,0.3);">تأكيد الحجز الآن <i class="ri-arrow-left-line"></i></button>
                </form>
            </div>
            <div class="success-state" id="successState">
                <i class="ri-checkbox-circle-fill success-icon"></i>
                <h3 style="font-weight:900;">تم إرسال طلبك بنجاح!</h3>
                <p class="text-muted">سيتواصل معك الحرفي قريباً.</p>
                <button class="btn btn-primary mt-20" onclick="closeModal()">حسناً</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let currentArtisan = null;

        async function fetchArtisanDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const artisanId = urlParams.get('id');

            if (!artisanId) { window.location.href = 'artisans.html'; return; }

            // Check if this is the logged-in user viewing their own profile
            const loggedUser = JSON.parse(localStorage.getItem('hrfa_user') || '{}');
            if (loggedUser.id && loggedUser.id.toString() === artisanId) {
                updateUI({
                    ...loggedUser,
                    cityLabel: loggedUser.cityLabel || 'الدار البيضاء',
                    categoryLabel: loggedUser.categoryLabel || 'كهرباء',
                    rating: 4.9,
                    reviews: 128,
                    price: 150,
                    verified: true
                });
                document.getElementById('loading').style.display = 'none';
                return;
            }

            try {
                const data = await api.getArtisanById(artisanId);
                if (data.success) {
                    updateUI(data.data);
                } else {
                    useStaticFallback(artisanId);
                }
            } catch (error) {
                useStaticFallback(artisanId);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateUI(a) {
            currentArtisan = a;
            document.getElementById('artisanName').textContent = a.name;
            document.getElementById('artisanAvatar').src = a.avatar;
            document.getElementById('artisanLocation').textContent = a.cityLabel;
            document.getElementById('artisanCategory').textContent = a.categoryLabel;
            document.getElementById('artisanRating').textContent = `${a.rating} (${a.reviews} تقييم)`;
            document.getElementById('artisanBio').textContent = a.bio;
            document.getElementById('reviewCount').textContent = a.reviews;

            if (a.verified) document.getElementById('verifiedBadge').style.display = 'inline-block';
            document.title = `${a.name} | HRFA.MA`;

            // Render some dummy reviews
            renderReviews();
            
            // Render Portfolio from localStorage
            renderPortfolio(a.id);
        }

        function renderPortfolio(id) {
            const container = document.getElementById('portfolioGallery');
            const storageKey = `hrfa_portfolio_${id}`;
            const images = JSON.parse(localStorage.getItem(storageKey) || '[]');
            
            if (images.length > 0) {
                container.innerHTML = images.map(img => `
                    <div class="gallery-item"><img src="${img}"></div>
                `).join('');
            } else {
                // If no custom portfolio, show standard placeholders
                container.innerHTML = `
                    <div class="gallery-item"><img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?auto=format&fit=crop&q=80"></div>
                    <div class="gallery-item"><img src="https://images.unsplash.com/photo-1540104539506-692589e47209?auto=format&fit=crop&q=80"></div>
                    <div class="gallery-item"><img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80"></div>
                    <div class="gallery-item"><img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80"></div>
                `;
            }
        }

        function useStaticFallback(id) {
            const dummy = {
                name: 'أحمد العبدلاوي',
                avatar: 'https://ui-avatars.com/api/?name=Ahmed+A&background=FF4500&color=fff&size=200',
                cityLabel: 'الدار البيضاء',
                categoryLabel: 'كهرباء',
                rating: 4.9,
                reviews: 128,
                bio: 'مختص في كشف أعطال الكهرباء المنزلية وتركيب الثريات واللوحات الكهربائية الحديثة. خبرة أكثر من 12 سنة في الميدان.',
                verified: true
            };
            updateUI(dummy);
        }

        function renderReviews() {
            const container = document.getElementById('reviewsContainer');
            const reviews = [
                { name: 'محمد ر.', rating: 5, date: 'قبل يومين', comment: 'خدمة ممتازة واحترافية عالية. التزم بالوقت وكان خلوقاً جداً.' },
                { name: 'سناء ع.', rating: 4, date: 'قبل أسبوع', comment: 'عمل جيد وسريع. أنصح به.' }
            ];
            container.innerHTML = reviews.map(r => `
                <div style="padding:20px; border-bottom:1px solid var(--border-color);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h4 style="font-weight:900;">${r.name}</h4>
                        <span style="font-size:12px; color:var(--text-muted);">${r.date}</span>
                    </div>
                    <div class="rating-stars mb-20">${'<i class="ri-star-fill"></i>'.repeat(r.rating)}</div>
                    <p class="text-muted" style="font-size:15px;">"${r.comment}"</p>
                </div>
            `).join('');
        }

        function handleBookingAction() {
            if (!currentArtisan) return;
            
            document.getElementById('bArtisanId').value = currentArtisan.id;
            document.getElementById('bArtisanName').value = currentArtisan.name;
            document.getElementById('modalArtisanInfo').innerHTML = `
                <img src="${currentArtisan.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentArtisan.name)}" alt="${currentArtisan.name}">
                <div>
                    <h4 style="font-weight:900; margin-bottom:2px;">${currentArtisan.name}</h4>
                    <p class="text-muted" style="font-size:13px;">${currentArtisan.categoryLabel} | ${currentArtisan.cityLabel}</p>
                </div>
            `;
            document.getElementById('formState').style.display = 'block';
            document.getElementById('successState').style.display = 'none';
            document.getElementById('bookingModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('open');
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('hrfa_user') || 'null');
            if (!user) {
                alert('يرجى تسجيل الدخول أولاً لإتمام الحجز.');
                window.location.href = 'login.html';
                return;
            }

            const btn = document.getElementById('submitBookingBtn');
            btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> جارٍ الإرسال...';
            btn.disabled = true;

            const bookingData = {
                artisanId: document.getElementById('bArtisanId').value,
                artisanName: document.getElementById('bArtisanName').value,
                clientId: user.id || 'client_123',
                clientName: user.name,
                serviceType: document.getElementById('bService').value,
                date: document.getElementById('bDate').value,
                time: document.getElementById('bTime').value,
                address: document.getElementById('bAddress').value
            };

            try {
                // We'll simulate success since the API might not be running in this environment
                // but we keep the fetch call for future backend integration
                console.log('Sending booking:', bookingData);
                
                // In a real scenario:
                // const response = await fetch(`${API}/bookings`, { ... });
                
                // For demo/static purposes, we show success after a short delay
                setTimeout(() => {
                    document.getElementById('formState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    btn.innerHTML = 'تأكيد الحجز الآن <i class="ri-arrow-left-line"></i>';
                    btn.disabled = false;
                }, 800);

            } catch (err) {
                console.error('Booking error:', err);
                alert('حدث خطأ أثناء إرسال طلبك. يرجى المحاولة لاحقاً.');
                btn.disabled = false;
                btn.innerHTML = 'تأكيد الحجز الآن <i class="ri-arrow-left-line"></i>';
            }
        });

        function handleChatAction() {
            window.location.href = 'client-dashboard.html?tab=chat';
        }

        window.onload = fetchArtisanDetails;
    </script>
</body>

</html>
